<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 箱ゲーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #312e81, #581c87, #831843);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .card { background: #fff; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); padding: 24px; width: 100%; max-width: 380px; text-align: center; }
    h1 { font-size: 22px; font-weight: 800; color: #1f2937; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #9ca3af; margin-bottom: 10px; }

    /* Multiplier */
    .mult-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
    .mult-badge { border-radius: 8px; padding: 3px 10px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid; transition: background .15s; }
    .mult-badge.stay { color: #6366f1; border-color: #c7d2fe; background: #eef2ff; }
    .mult-badge.stay:hover { background: #e0e7ff; }
    .mult-badge.sw { color: #d97706; border-color: #fcd34d; background: #fffbeb; }
    .mult-badge.sw:hover { background: #fef3c7; }
    .mult-edit-row { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 11px; color: #6b7280; }
    .mult-input { width: 52px; border: 1.5px solid #c7d2fe; border-radius: 7px; padding: 3px 6px; font-size: 12px; text-align: center; }
    .save-btn { font-size: 11px; background: #6366f1; color: #fff; border: none; border-radius: 7px; padding: 4px 9px; cursor: pointer; }

    /* Points */
    .points-box { background: #eef2ff; border-radius: 16px; padding: 10px 24px; display: inline-block; margin-bottom: 14px; }
    .points-num { font-size: 30px; font-weight: 800; color: #6366f1; }
    .points-unit { font-size: 14px; color: #a5b4fc; font-weight: 600; margin-left: 4px; }

    /* Bet */
    .section-title { font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 10px; }
    /* ±ボタン: 左マイナス・右プラス */
    .bet-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .bet-num { font-size: 26px; font-weight: 800; color: #1f2937; min-width: 52px; }
    .bet-minus-group, .bet-plus-group { display: flex; flex-direction: column; gap: 3px; }
    .bet-spin { padding: 2px 8px; border-radius: 6px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; transition: background .15s; line-height: 1.5; }
    .bet-spin.minus { background: #fef2f2; color: #dc2626; }
    .bet-spin.minus:hover { background: #fee2e2; }
    .bet-spin.plus { background: #f0fdf4; color: #16a34a; }
    .bet-spin.plus:hover { background: #dcfce7; }
    .bet-spin.multi { background: #f5f3ff; color: #7c3aed; }
    .bet-spin.multi:hover { background: #ede9fe; }
    .bet-info { font-size: 11px; color: #9ca3af; margin-bottom: 10px; line-height: 1.6; }
    .bet-info .gain-stay { color: #6366f1; font-weight: 700; }
    .bet-info .gain-sw { color: #f59e0b; font-weight: 700; }

    /* Quick bets */
    .quick-bets { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
    .quick-bet { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: background .15s; background: #f3f4f6; color: #4b5563; }
    .quick-bet:hover { background: #e5e7eb; }
    .quick-bet.active { background: #6366f1; color: #fff; }
    .quick-bet.allin { background: #fef2f2; color: #ef4444; }
    .quick-bet.allin.active { background: #ef4444; color: #fff; }

    /* Buttons */
    .btn-main { width: 100%; padding: 12px; border-radius: 14px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; transition: background .15s; background: #6366f1; color: #fff; }
    .btn-main:hover { background: #4f46e5; }
    .btn-end { width: 100%; padding: 9px; border-radius: 12px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; background: #f3f4f6; color: #9ca3af; margin-top: 8px; }
    .btn-end:hover { background: #e5e7eb; color: #6b7280; }
    .btn-stay { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #c7d2fe; background: #eef2ff; color: #6366f1; font-weight: 800; font-size: 13px; cursor: pointer; }
    .btn-stay:hover { background: #e0e7ff; }
    .btn-switch { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #fcd34d; background: #fffbeb; color: #d97706; font-weight: 800; font-size: 13px; cursor: pointer; }
    .btn-switch:hover { background: #fef3c7; }
    .switch-row { display: flex; gap: 10px; margin-top: 6px; }
    .switch-hint { font-size: 10px; color: #9ca3af; margin-top: 4px; display: flex; justify-content: space-between; padding: 0 2px; }

    /* Boxes */
    .bet-label { font-size: 12px; color: #9ca3af; margin-bottom: 8px; }
    .bet-label span { color: #6366f1; font-weight: 700; }
    .boxes-row { display: flex; justify-content: center; gap: 12px; margin: 12px 0; }
    .box-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .box { width: 80px; height: 80px; border-radius: 18px; border: 4px solid #bfdbfe; background: #eff6ff; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .15s, border-color .15s, background .15s, opacity .2s; user-select: none; }
    .box:hover { transform: scale(1.07); border-color: #3b82f6; }
    .box.selected { border-color: #fbbf24; background: #fffbeb; }
    .box.revealed { border-color: #e5e7eb; background: #f9fafb; opacity: 0.4; cursor: default; }
    .box.revealed:hover { transform: none; }
    .box.win { border-color: #4ade80; background: #f0fdf4; }
    .box.lose { border-color: #f87171; background: #fef2f2; }
    .box.answer { border-color: #fbbf24; background: #fffbeb; }
    .box.disabled { cursor: default; } .box.disabled:hover { transform: none; }
    .box-lbl { font-size: 11px; color: #9ca3af; font-weight: 600; }

    /* Message */
    .message { font-size: 14px; font-weight: 700; padding: 0 8px; margin: 6px 0; }
    .message.win { color: #22c55e; } .message.lose { color: #ef4444; } .message.info { color: #6366f1; }

    /* Stats */
    .stats-section { margin-top: 16px; border-top: 1px solid #f3f4f6; padding-top: 14px; }
    .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .stats-title { font-size: 11px; font-weight: 700; color: #6b7280; }
    .reset-link { font-size: 10px; color: #d1d5db; background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    .reset-link:hover { color: #9ca3af; background: #f3f4f6; }
    .stat-bar-wrap { margin-bottom: 10px; text-align: left; }
    .stat-bar-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .stat-bar-label { font-size: 11px; font-weight: 600; color: #4b5563; }
    .stat-bar-val { font-size: 11px; color: #9ca3af; }
    .rate-switch { color: #6366f1; font-weight: 700; }
    .rate-stay { color: #6b7280; font-weight: 700; }
    .bar-track { position: relative; height: 10px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
    .bar-theory { position: absolute; top: 0; bottom: 0; width: 2px; background: #9ca3af; z-index: 2; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width .5s; }
    .bar-fill.switch { background: #818cf8; }
    .bar-fill.stay { background: #9ca3af; }
    .bar-theory-label { font-size: 10px; color: #d1d5db; text-align: right; margin-top: 2px; }
    .stats-comment { font-size: 11px; color: #9ca3af; font-style: italic; margin-top: 6px; min-height: 16px; }
    .stats-comment.alert { color: #f59e0b; font-style: normal; font-weight: 600; }

    /* History */
    .history-section { margin-top: 14px; border-top: 1px solid #f3f4f6; padding-top: 12px; }
    .history-title { font-size: 11px; color: #9ca3af; font-weight: 600; margin-bottom: 6px; }
    .history-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #6b7280; margin-bottom: 3px; }
    .history-left { display: flex; gap: 4px; align-items: center; }
    .history-switch { color: #818cf8; } .history-stay { color: #9ca3af; } .history-star { color: #f59e0b; }
    .history-gain.win { color: #22c55e; font-weight: 600; } .history-gain.lose { color: #f87171; }

    /* Gameover */
    .gameover { padding: 8px 0; }
    .gameover-title { font-size: 22px; font-weight: 800; color: #ef4444; margin-bottom: 8px; }
    .gameover-sub { font-size: 13px; color: #9ca3af; margin-bottom: 14px; }

    /* Impatience overlay */
    .imp-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
    .imp-overlay.show { display: flex; }
    .imp-card { background: #fff; border-radius: 24px; padding: 32px 24px; max-width: 320px; width: 100%; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); animation: popIn .35s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes popIn { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .imp-surprise { font-size: 12px; color: #9ca3af; margin-bottom: 6px; letter-spacing: .05em; }
    .imp-title { font-size: 18px; font-weight: 800; color: #1f2937; margin-bottom: 16px; }
    .imp-score-big { font-size: 56px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .imp-score-big.positive { color: #6366f1; }
    .imp-score-big.negative { color: #ef4444; }
    .imp-label-big { font-size: 20px; font-weight: 800; color: #1f2937; margin-bottom: 8px; }
    .imp-detail-text { font-size: 11px; color: #9ca3af; margin-bottom: 20px; line-height: 1.7; }
    .imp-btn-row { display: flex; gap: 8px; }
    .imp-play { flex: 1; padding: 12px; border-radius: 14px; border: none; background: #6366f1; color: #fff; font-size: 14px; font-weight: 800; cursor: pointer; }
    .imp-play:hover { background: #4f46e5; }
    .imp-quit { flex: 1; padding: 12px; border-radius: 14px; border: none; background: #f3f4f6; color: #6b7280; font-size: 14px; font-weight: 800; cursor: pointer; }
    .imp-quit:hover { background: #e5e7eb; }
  </style>
</head>
<body>

<!-- せっかち度オーバーレイ -->
<div class="imp-overlay" id="imp-overlay">
  <div class="imp-card">
    <p class="imp-surprise">🎉 実はこんな機能がありました</p>
    <p class="imp-title">🧘 せっかち度判定</p>
    <div class="imp-score-big" id="imp-score-big">+0</div>
    <div class="imp-label-big" id="imp-label-big">-</div>
    <div class="imp-detail-text" id="imp-detail-text"></div>
    <div class="imp-btn-row">
      <button class="imp-play" onclick="closeImp(false)">もう一度遊ぶ</button>
      <button class="imp-quit" onclick="closeImp(true)">終了する</button>
    </div>
  </div>
</div>

<div class="card">
  <h1>🎰 箱ゲーム</h1>
  <p class="subtitle">モンティ・ホール方式</p>

  <div class="mult-row" id="mult-display-row">
    <button class="mult-badge stay" onclick="openMultEdit('stay')">そのまま当たり <span id="stay-mult-label">3</span>倍 ✏️</button>
    <button class="mult-badge sw" onclick="openMultEdit('sw')">変更して当たり <span id="sw-mult-label">2.5</span>倍 ✏️</button>
  </div>
  <div class="mult-edit-row" id="mult-edit-row" style="display:none">
    <span id="mult-editing-label"></span>
    <input class="mult-input" id="mult-edit-input" type="number" step="0.1" min="1.1">
    <button class="save-btn" onclick="saveMult()">保存</button>
  </div>

  <div class="points-box">
    <span class="points-num" id="points-num">10</span><span class="points-unit">pt</span>
  </div>

  <div id="main-area"></div>

  <div class="stats-section">
    <div class="stats-header">
      <span class="stats-title">📊 勝率統計（<span id="total-games">0</span>回）</span>
      <button class="reset-link" id="reset-link" style="display:none" onclick="resetStats()">統計クリア</button>
    </div>
    <div class="stat-bar-wrap">
      <div class="stat-bar-top">
        <span class="stat-bar-label">🔄 変更した場合</span>
        <span class="stat-bar-val"><span id="sw-wins">0</span>/<span id="sw-total">0</span>回 <span class="rate-switch" id="sw-rate">0%</span></span>
      </div>
      <div class="bar-track">
        <div class="bar-theory" style="left:67%"></div>
        <div class="bar-fill switch" id="sw-bar" style="width:0%"></div>
      </div>
      <div class="bar-theory-label">理論値 67%</div>
    </div>
    <div class="stat-bar-wrap">
      <div class="stat-bar-top">
        <span class="stat-bar-label">👆 そのままの場合</span>
        <span class="stat-bar-val"><span id="st-wins">0</span>/<span id="st-total">0</span>回 <span class="rate-stay" id="st-rate">0%</span></span>
      </div>
      <div class="bar-track">
        <div class="bar-theory" style="left:33%"></div>
        <div class="bar-fill stay" id="st-bar" style="width:0%"></div>
      </div>
      <div class="bar-theory-label">理論値 33%</div>
    </div>
    <p class="stats-comment" id="stats-comment"></p>
  </div>

  <div class="history-section" id="history-section" style="display:none">
    <p class="history-title">直近の履歴</p>
    <div id="history-list"></div>
  </div>
</div>

<script>
const LABELS = ["左", "中", "右"];

let state = {
  points: 10, bet: 1,
  stayMult: 3, swMult: 2.5,
  selected: null, answer: null, revealed: null, final: null,
  phase: "bet",
  history: [],
  stats: { sw:{total:0,wins:0}, st:{total:0,wins:0} },
  totalGames: 0,
  startCount: 1,
  allInLosses: 0,
  lastResult: null,
};

// --- Multiplier edit ---
let editingMult = null;
function openMultEdit(which) {
  editingMult = which;
  document.getElementById('mult-display-row').style.display = 'none';
  document.getElementById('mult-edit-row').style.display = '';
  document.getElementById('mult-editing-label').textContent = which === 'stay' ? 'そのまま倍率:' : '変更倍率:';
  document.getElementById('mult-edit-input').value = which === 'stay' ? state.stayMult : state.swMult;
  document.getElementById('mult-edit-input').focus();
}
function saveMult() {
  const v = parseFloat(document.getElementById('mult-edit-input').value);
  if (!isNaN(v) && v > 1) {
    if (editingMult === 'stay') { state.stayMult = Math.round(v*10)/10; document.getElementById('stay-mult-label').textContent = state.stayMult; }
    else { state.swMult = Math.round(v*10)/10; document.getElementById('sw-mult-label').textContent = state.swMult; }
  }
  document.getElementById('mult-display-row').style.display = '';
  document.getElementById('mult-edit-row').style.display = 'none';
  render();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('mult-edit-row').style.display !== 'none') saveMult();
});

// --- Game logic ---
function startPick() {
  if (state.bet < 1 || state.bet > state.points) return;
  state.selected = null; state.answer = null; state.revealed = null; state.final = null;
  state.phase = "pick";
  render();
}
function pickBox(index) {
  if (state.phase !== "pick") return;
  const winning = Math.floor(Math.random() * 3);
  state.selected = index; state.answer = winning;
  const losers = [0,1,2].filter(i => i !== index && i !== winning);
  state.revealed = losers[Math.floor(Math.random() * losers.length)];
  state.phase = "switch";
  render();
}
function decide(switchBox) {
  if (state.phase !== "switch") return;
  let finalPick = state.selected;
  if (switchBox) finalPick = [0,1,2].find(i => i !== state.selected && i !== state.revealed);
  state.final = finalPick;
  const won = finalPick === state.answer;
  const mult = switchBox ? state.swMult : state.stayMult;
  const prevPoints = state.points;
  const gain = won ? Math.round(state.bet * mult) - state.bet : -state.bet;
  state.points = Math.max(0, state.points + gain);
  if (state.bet === prevPoints) state.allInLosses++; // 全賭け（当たり外れ問わず）
  state.phase = "result";
  state.totalGames++;
  state.history.unshift({ won, bet: state.bet, gain, points: state.points,
    picked: state.selected, switched: switchBox, finalPick, answer: state.answer });
  if (state.history.length > 5) state.history.pop();
  // 統計：1回のプレイで変更/そのまま両方の仮想結果をカウント
  // 必ず sw.wins + st.wins = total になる（排他的）
  const switchWouldWin = ([0,1,2].find(i => i !== state.selected && i !== state.revealed)) === state.answer;
  const stayWouldWin = state.selected === state.answer;
  state.stats.sw.total++; state.stats.sw.wins += switchWouldWin ? 1 : 0;
  state.stats.st.total++; state.stats.st.wins += stayWouldWin ? 1 : 0;
  render();
}
function reset() {
  state.phase = "bet";
  state.selected = null; state.answer = null; state.revealed = null; state.final = null;
  render();
}
// 結果画面からそのまま次ラウンドへ
// keepBet=true: 同じベット額でスタート / false: ベット画面へ戻る
function nextRound(keepBet) {
  if (state.bet > state.points) state.bet = state.points;
  state.selected = null; state.answer = null; state.revealed = null; state.final = null;
  state.lastResult = null;
  if (keepBet) {
    // 同じベット額でそのまま箱選びへ
    state.phase = "pick";
  } else {
    // ベット変更したい → ベット画面へ
    state.phase = "bet";
  }
  render();
}
function restart() {
  state.startCount++;
  state.points = 10; state.bet = 1; state.phase = "bet";
  state.selected = null; state.answer = null; state.revealed = null; state.final = null;
  state.history = []; state.lastResult = null;
  render();
}
function resetStats() {
  if (!confirm("統計データとせっかち度をクリアしますか？")) return;
  state.stats = { sw:{total:0,wins:0}, st:{total:0,wins:0} };
  state.totalGames = 0; state.startCount = 1; state.allInLosses = 0;
  render();
}
function setBet(v) { state.bet = Math.max(1, Math.min(state.points, v)); render(); }

// --- クイックベットボタン生成 ---
function quickBetButtons() {
  const p = state.points;
  let midVals;
  if (p <= 20) {
    // 1ptと被る固定値を除外（3,5,10 は1ptと被らないが念のため）
    midVals = [3, 5, 10].filter(v => v > 1 && v < p && v !== 1);
  } else {
    const pct = [0.1, 0.2, 0.5].map(r => Math.floor(p * r)).filter(v => v > 1 && v < p);
    midVals = [...new Set(pct)];
  }

  // ×1.5・×2（1pt・全賭けと重複する値は除外）
  const x15 = Math.floor(state.bet * 1.5);
  const x2  = state.bet * 2;
  const multVals = [
    (x15 > state.bet && x15 < p && x15 !== 1) ? { v: x15, label: `×1.5→${x15}pt` } : null,
    (x2  > state.bet && x2  < p && x2  !== 1) ? { v: x2,  label: `×2→${x2}pt`   } : null,
  ].filter(Boolean);

  // 1pt ボタン：全賭けが1ptと同じ（所持1pt）なら非表示
  const showOne = p > 1;
  // 全賭けラベル（所持が1ptなら全賭けに統合、それ以外は別表示）
  const allinLabel = p === 1 ? "1pt（全賭け）" : "全賭け";

  const oneBtn = showOne
    ? `<button class="quick-bet${state.bet===1?' active':''}" onclick="setBet(1)">1pt</button>`
    : '';
  const midBtns = midVals.map(v =>
    `<button class="quick-bet${state.bet===v?' active':''}" onclick="setBet(${v})">${v}pt</button>`
  ).join("");
  const allinBtn = `<button class="quick-bet allin${state.bet===p?' active':''}" onclick="setBet(${p})">${allinLabel}</button>`;
  const multBtns = multVals.map(m =>
    `<button class="quick-bet multi" onclick="setBet(${m.v})">${m.label}</button>`
  ).join("");

  // 端数ボタン：最高桁を残した端数（10pt以下は非表示、端数0なら非表示）
  const digits = Math.floor(Math.log10(p)); // 例: 23→1, 123→2, 2345→3
  const topDigitVal = Math.pow(10, digits);  // 例: 23→10, 123→100, 2345→1000
  const hasuta = p % topDigitVal;            // 例: 23→3, 123→23, 2345→345
  const hasutaBtn = (p > 10 && hasuta > 0 && hasuta !== p && hasuta !== 1)
    ? `<button class="quick-bet${state.bet===hasuta?' active':''}" onclick="setBet(${hasuta})" title="端数賭け">端数 ${hasuta}pt</button>`
    : '';

  return oneBtn + midBtns + allinBtn + (multBtns ? '<br style="width:100%;margin:3px 0">' + multBtns : '') + (hasutaBtn ? ' ' + hasutaBtn : '');
}

// --- せっかち度計算 ---
function calcImpatience() {
  if (state.totalGames === 0) return null;
  const avg = state.totalGames / state.startCount;
  let score =
    avg <= 3  ? -5 : avg <= 5  ? -4 : avg <= 8  ? -3 : avg <= 12 ? -2 :
    avg <= 17 ? -1 : avg <= 23 ? 0  : avg <= 30 ? 1  : avg <= 40 ? 2  :
    avg <= 55 ? 3  : avg <= 75 ? 4  : 5;
  score -= state.allInLosses * 1;
  const label =
    score <= -5 ? "借金取りに追われてますか？💨" :
    score === -4 ? "鬼せっかち 😤" :
    score === -3 ? "かなりせっかち 😅" :
    score === -2 ? "せっかち 😬" :
    score === -1 ? "ちょいせっかち 🙂" :
    score === 0  ? "普通 😌" :
    score === 1  ? "落ち着いてる 🍵" :
    score === 2  ? "かなり落ち着いてる 🌿" :
    score === 3  ? "超落ち着いてる 🧘" :
    score === 4  ? "菩薩の落ち着き 🪷" : "仏の落ち着き ✨";
  return { score, label, avg: avg.toFixed(1), starts: state.startCount, games: state.totalGames };
}

function showImpOverlay() {
  const imp = calcImpatience();
  if (!imp) return false;
  const el = document.getElementById('imp-score-big');
  el.textContent = imp.score >= 0 ? "+" + imp.score : String(imp.score);
  el.className = "imp-score-big " + (imp.score >= 0 ? "positive" : "negative");
  document.getElementById('imp-label-big').textContent = imp.label;
  document.getElementById('imp-detail-text').innerHTML =
    `平均 <b>${imp.avg}回</b> / ゲーム<br>` +
    `総プレイ ${imp.games}回 ／ ${imp.starts}スタート` +
    (state.allInLosses > 0 ? `<br>全賭け ${state.allInLosses}回（−${state.allInLosses}点）` : "");
  document.getElementById('imp-overlay').className = "imp-overlay show";
  return true;
}

function showEnd() {
  if (!showImpOverlay()) {
    if (confirm("終了しますか？")) closeImp(true);
  }
}

function closeImp(quit) {
  document.getElementById('imp-overlay').className = "imp-overlay";
  if (quit) {
    document.body.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;color:#fff;gap:16px'><div style='font-size:56px'>🎰</div><div style='font-size:22px;font-weight:800'>またね！</div></div>";
  }
}

// --- 統計コメント ---
function statsComment() {
  const total = state.stats.sw.total;
  if (total < 5) return { text: "回数を重ねると傾向が見えてきます…", alert: false };
  const sr = state.stats.sw.wins / total;
  const tr = state.stats.st.wins / total;
  if (total >= 15 && tr < 0.20)
    return { text: "⚠️ そろそろそのままが多く出るかも？確率は均衡に向かいます", alert: true };
  if (sr > tr + 0.1) return { text: "📊 変更した方が勝ちやすい傾向が出てきました！", alert: false };
  if (tr > sr + 0.1) return { text: "📊 まだそのままの方が多い…もう少し続けてみて！", alert: false };
  return { text: "📊 今のところ接戦です。もう少し続けてみましょう！", alert: false };
}

// --- Render helpers ---
function boxClass(i) {
  const ph = state.phase;
  if (ph === "result") {
    if (i === state.final && i === state.answer) return "box win";
    if (i === state.final && i !== state.answer) return "box lose";
    if (i === state.answer) return "box answer";
    return "box disabled";
  }
  if (ph === "switch") {
    if (i === state.revealed) return "box revealed";
    if (i === state.selected) return "box selected";
    return "box disabled";
  }
  if (ph === "pick") return "box";
  return "box disabled";
}
function boxEmoji(i) {
  if (state.phase === "result") return i === state.answer ? "⭐" : "❌";
  if (state.phase === "switch") {
    if (i === state.revealed) return "💨";
    if (i === state.selected) return "👆";
    return "📦";
  }
  return "📦";
}

// --- Main render ---
function render() {
  document.getElementById("points-num").textContent = state.points;

  // Stats
  const total = state.stats.sw.total;
  document.getElementById("total-games").textContent = total;
  document.getElementById("reset-link").style.display = total > 0 ? "" : "none";
  const swRate = total === 0 ? 0 : Math.round(state.stats.sw.wins / total * 100);
  const stRate = total === 0 ? 0 : Math.round(state.stats.st.wins / total * 100);
  document.getElementById("sw-wins").textContent = state.stats.sw.wins;
  document.getElementById("sw-total").textContent = total;
  document.getElementById("sw-rate").textContent = swRate + "%";
  document.getElementById("sw-bar").style.width = swRate + "%";
  document.getElementById("st-wins").textContent = state.stats.st.wins;
  document.getElementById("st-total").textContent = total;
  document.getElementById("st-rate").textContent = stRate + "%";
  document.getElementById("st-bar").style.width = stRate + "%";
  const comment = statsComment();
  const cEl = document.getElementById("stats-comment");
  cEl.textContent = total > 0 ? comment.text : "";
  cEl.className = "stats-comment" + (comment.alert ? " alert" : "");

  // History
  const hs = state.history;
  document.getElementById("history-section").style.display = hs.length > 0 ? "" : "none";
  document.getElementById("history-list").innerHTML = hs.map(h => `
    <div class="history-row">
      <span class="history-left">
        ${h.won ? "✅" : "❌"}
        <span>${LABELS[h.picked]}選</span>
        ${h.switched ? `<span class="history-switch">→${LABELS[h.finalPick]}変更</span>` : `<span class="history-stay">そのまま</span>`}
        <span class="history-star">⭐${LABELS[h.answer]}</span>
      </span>
      <span class="history-gain ${h.won ? 'win' : 'lose'}">
        ${h.won ? '+'+h.gain : h.gain}pt→${h.points}pt
      </span>
    </div>`).join("");

  const mainEl = document.getElementById("main-area");
  const gameOver = state.points <= 0;

  // ゲームオーバー時もせっかち度を出す
  if (gameOver) {
    const imp = calcImpatience();
    const impHtml = imp ? `
      <div style="background:#f5f3ff;border-radius:14px;padding:12px;margin:12px 0 0;text-align:center">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:4px">🎉 せっかち度判定</div>
        <div style="font-size:32px;font-weight:900;color:${imp.score>=0?'#6366f1':'#ef4444'}">${imp.score>=0?'+':''}${imp.score}</div>
        <div style="font-size:14px;font-weight:800;color:#1f2937;margin:2px 0 4px">${imp.label}</div>
        <div style="font-size:10px;color:#9ca3af">平均${imp.avg}回/ゲーム（${imp.games}回/${imp.starts}スタート）${state.allInLosses>0?' 全賭け'+state.allInLosses+'回':''}</div>
      </div>` : '';
    mainEl.innerHTML = `
      <div class="gameover">
        <p class="gameover-title">💸 ゲームオーバー</p>
        <p class="gameover-sub">ポイントがなくなりました</p>
        ${impHtml}
        <button class="btn-main" style="margin-top:14px" onclick="restart()">もう一度（統計は引き継ぎ）</button>
        <button class="btn-end" onclick="showEnd()">🚪 終了する</button>
      </div>`;
    return;
  }

  if (state.phase === "bet") {
    const stayEarn = Math.round(state.bet * state.stayMult) - state.bet;
    const swEarn   = Math.round(state.bet * state.swMult)   - state.bet;
    mainEl.innerHTML = `
      <p class="section-title">賭けるポイントを選んでください</p>
      <div class="bet-row">
        <div class="bet-minus-group">
          <button class="bet-spin minus" onclick="setBet(state.bet-100)">−100</button>
          <button class="bet-spin minus" onclick="setBet(state.bet-10)">−10</button>
          <button class="bet-spin minus" onclick="setBet(state.bet-1)">−1</button>
        </div>
        <span class="bet-num">${state.bet}</span>
        <div class="bet-plus-group">
          <button class="bet-spin plus" onclick="setBet(state.bet+100)">+100</button>
          <button class="bet-spin plus" onclick="setBet(state.bet+10)">+10</button>
          <button class="bet-spin plus" onclick="setBet(state.bet+1)">+1</button>
        </div>
      </div>
      <p class="bet-info">
        そのまま当たり → <span class="gain-stay">${Math.round(state.bet*state.stayMult)}pt</span>（+${stayEarn}pt）<br>
        変更して当たり → <span class="gain-sw">${Math.round(state.bet*state.swMult)}pt</span>（+${swEarn}pt）
      </p>
      <div class="quick-bets">${quickBetButtons()}</div>
      <button class="btn-main" onclick="startPick()">決定！</button>
      <button class="btn-end" onclick="showEnd()">🚪 終了する</button>`;
    return;
  }

  // result フェーズはそのまま画面に残す（上のrender内で処理）

  // 前回結果フラッシュ（ベット画面用）
  const flashHtml = state.lastResult
    ? `<p class="message ${state.lastResult.won?'win':'lose'}" style="margin-bottom:6px">${state.lastResult.msg}</p>`
    : '';

  if (state.phase === "bet") {
    const stayEarn = Math.round(state.bet * state.stayMult) - state.bet;
    const swEarn   = Math.round(state.bet * state.swMult)   - state.bet;
    mainEl.innerHTML = `
      ${flashHtml}
      <p class="section-title">賭けるポイントを選んでください</p>
      <div class="bet-row">
        <div class="bet-minus-group">
          <button class="bet-spin minus" onclick="setBet(state.bet-100)">−100</button>
          <button class="bet-spin minus" onclick="setBet(state.bet-10)">−10</button>
          <button class="bet-spin minus" onclick="setBet(state.bet-1)">−1</button>
        </div>
        <span class="bet-num">${state.bet}</span>
        <div class="bet-plus-group">
          <button class="bet-spin plus" onclick="setBet(state.bet+100)">+100</button>
          <button class="bet-spin plus" onclick="setBet(state.bet+10)">+10</button>
          <button class="bet-spin plus" onclick="setBet(state.bet+1)">+1</button>
        </div>
      </div>
      <p class="bet-info">
        そのまま当たり → <span class="gain-stay">${Math.round(state.bet*state.stayMult)}pt</span>（+${stayEarn}pt）<br>
        変更して当たり → <span class="gain-sw">${Math.round(state.bet*state.swMult)}pt</span>（+${swEarn}pt）
      </p>
      <div class="quick-bets">${quickBetButtons()}</div>
      <button class="btn-main" onclick="startPick()">決定！</button>
      <button class="btn-end" onclick="showEnd()">🚪 終了する</button>`;
    return;
  }

  // pick / switch / result
  const isResult = state.phase === "result";
  const isSwitch = state.phase === "switch";

  let topMsg = "", topMsgClass = "info";
  if (isSwitch) {
    topMsg = `「${LABELS[state.revealed]}」はハズレでした！変更しますか？`;
  } else if (isResult) {
    const won = state.final === state.answer;
    const switched = state.history[0].switched;
    const mult = switched ? state.swMult : state.stayMult;
    const gain = won ? Math.round(state.bet * mult) - state.bet : -state.bet;
    topMsg = won ? `🎉 当たり！ +${gain}pt 獲得！` : `😢 ハズレ… -${state.bet}pt`;
    topMsgClass = won ? "win" : "lose";
  }

  // 結果画面でも次ラウンド用にdecideを呼ぶ → reset→startPickをまとめた関数
  mainEl.innerHTML = `
    <p class="bet-label">賭け: <span>${state.bet}pt</span></p>
    <div class="boxes-row">
      ${[0,1,2].map(i => `
        <div class="box-wrap">
          <div class="${boxClass(i)}" onclick="${state.phase==='pick'?`pickBox(${i})`:''}">${boxEmoji(i)}</div>
          <span class="box-lbl">${LABELS[i]}</span>
        </div>`).join("")}
    </div>
    ${topMsg ? `<p class="message ${topMsgClass}">${topMsg}</p>` : ""}
    ${isSwitch || isResult ? `
      <div class="switch-row">
        <button class="btn-switch" onclick="${isResult?'nextRound(false)':'decide(true)'}">変更する 🔄<br><small>${isResult?'ベット変更へ':'当たり'+state.swMult+'倍'}</small></button>
        <button class="btn-stay" onclick="${isResult?'nextRound(true)':'decide(false)'}">そのまま 👆<br><small>${isResult?'同じベットで続行':'当たり'+state.stayMult+'倍'}</small></button>
      </div>
      ${isSwitch ? `<div class="switch-hint"><span>確率1/3 → 高倍率</span><span>確率2/3 → 低倍率</span></div>` : ''}
      <button class="btn-end" style="margin-top:8px" onclick="showEnd()">🚪 終了する</button>` : ""}`;
}

render();
</script>
</body>
</html>
