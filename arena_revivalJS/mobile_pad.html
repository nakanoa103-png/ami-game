<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arena Revival Mobile (Pad)</title>

    <!-- OGP / リンクカード用（PC版と同じ画像）-->
    <meta property="og:title"        content="Arena Revival">
    <meta property="og:description"  content="レトロ風トップダウンアクション。押し寄せる敵の波をかいくぐり、ウェーブを生き延びろ！（スマホ版）">
    <meta property="og:type"         content="website">
    <meta property="og:image"        content="https://nakanoa103-png.github.io/assets/images/ogp.jpg">
    <meta property="og:image:width"  content="1536">
    <meta property="og:image:height" content="768">
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="Arena Revival">
    <meta name="twitter:description" content="レトロ風トップダウンアクション。押し寄せる敵の波をかいくぐり、ウェーブを生き延びろ！（スマホ版）">
    <meta name="twitter:image"       content="https://nakanoa103-png.github.io/assets/images/ogp.jpg">

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; background: #111; overflow: hidden; touch-action: none; }

        /* ゲーム画面: 上半分に配置（指で隠れにくい）*/
        #screen {
            position: fixed;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100vw;
            max-height: 50dvh;
            width: auto; height: auto;
            z-index: 1;
        }

        /* パッド反応ゾーン: 画面下半分 */
        #pad-zone {
            position: fixed;
            left: 0; right: 0;
            top: 50dvh; bottom: 0;
            z-index: 5;
            touch-action: none;
        }

        /* デバッグ描画オーバーレイ（中心/スティック）。タッチは透過 */
        #pad-fx {
            position: fixed;
            inset: 0;
            z-index: 6;
            pointer-events: none;
        }

        /* パッドゾーンの薄いガイド表示 */
        #pad-hint {
            position: fixed;
            left: 0; right: 0; bottom: 10px;
            text-align: center;
            color: #445; font: 11px monospace;
            z-index: 6; pointer-events: none;
        }

        #pause-btn {
            position: fixed;
            top: 8px; right: 8px;
            width: 52px; height: 36px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            color: #aaa; font-size: 14px;
            z-index: 10;
            touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="screen"></canvas>

    <!-- 下半分: スライド式パッドの反応ゾーン -->
    <div id="pad-zone"></div>
    <canvas id="pad-fx"></canvas>
    <div id="pad-hint">▼ 画面下半分をスライドで移動（Vキーでデバッグ表示切替）</div>

    <button id="pause-btn">❚❚</button>

    <!-- 共通モジュール（mobile.html と同一・無改変）-->
    <script src="js/settings.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/tilemap.js"></script>
    <script src="js/item.js"></script>
    <!-- スマホ版ゲーム本体（無改変）-->
    <script src="js/player_mobile.js"></script>
    <script src="js/enemy_mobile.js"></script>
    <script src="js/wave_mobile.js"></script>
    <script src="js/main_mobile.js"></script>
    <!-- 追加入力経路: スライド式バーチャルパッド -->
    <script src="js/pad_input.js"></script>
</body>
</html>
