<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arena Revival</title>

    <!-- OGP / リンクカード用 -->
    <meta property="og:title"        content="Arena Revival">
    <meta property="og:description"  content="レトロ風トップダウンアクション。押し寄せる敵の波をかいくぐり、ウェーブを生き延びろ！">
    <meta property="og:type"         content="website">
    <meta property="og:image"        content="https://nakanoa103-png.github.io/assets/images/ogp.jpg">
    <meta property="og:image:width"  content="1536">
    <meta property="og:image:height" content="768">

    <!-- Twitter / X カード -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="Arena Revival">
    <meta name="twitter:description" content="レトロ風トップダウンアクション。押し寄せる敵の波をかいくぐり、ウェーブを生き延びろ！">
    <meta name="twitter:image"       content="https://nakanoa103-png.github.io/assets/images/ogp.jpg">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            /* スマホでは画面幅に合わせて縮小 */
            max-width: 100vw;
            max-height: 60dvh;
            width: auto;
            height: auto;
        }

        #hint {
            color: #555;
            font: 11px monospace;
            margin-top: 6px;
            letter-spacing: 0.04em;
        }

        /* ── タッチコントロール ── */
        #touch-ui {
            display: none;   /* JS で touch 検出時に flex に切り替え */
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            justify-content: space-between;
            align-items: flex-end;
            padding: 12px 28px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            z-index: 10;
            pointer-events: none;
        }

        #dpad {
            display: grid;
            grid-template-areas: ". up ." "left atk right" ". down .";
            gap: 4px;
            pointer-events: all;
        }

        .dpad-btn {
            width: 56px; height: 56px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 10px;
            color: #fff;
            font-size: 22px;
            line-height: 1;
            touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
        .dpad-btn:active { background: rgba(255,255,255,0.4); }

        #dpad-up     { grid-area: up; }
        #dpad-left   { grid-area: left; }
        #dpad-right  { grid-area: right; }
        #dpad-down   { grid-area: down; }
        #dpad-attack {
            grid-area: atk;
            background: rgba(200,80,80,0.7);
            border-color: rgba(255,120,120,0.9);
            font-size: 20px;
        }
        #dpad-attack:active { background: rgba(220,50,50,0.95); }

        #right-cluster {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: all;
        }

        #attack-btn {
            width: 80px; height: 80px;
            background: rgba(200,40,40,0.6);
            border: 3px solid rgba(255,100,100,0.8);
            border-radius: 50%;
            color: #fff;
            font-size: 30px;
            touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
        #attack-btn:active { background: rgba(220,60,60,0.9); }

        #pause-btn {
            width: 48px; height: 32px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            color: #aaa;
            font-size: 13px;
            touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="screen"></canvas>
    <div id="hint">WASD / 矢印キー: 移動 &nbsp;|&nbsp; Space: 攻撃 &nbsp;|&nbsp; P / ESC: ポーズ</div>

    <!-- タッチ用オーバーレイ -->
    <div id="touch-ui">
        <div id="dpad">
            <button class="dpad-btn" id="dpad-up">▲</button>
            <button class="dpad-btn" id="dpad-left">◀</button>
            <button class="dpad-btn" id="dpad-attack">⚔</button>
            <button class="dpad-btn" id="dpad-right">▶</button>
            <button class="dpad-btn" id="dpad-down">▼</button>
        </div>
        <div id="right-cluster">
            <button id="pause-btn">❚❚</button>
            <button id="attack-btn">⚔</button>
        </div>
    </div>

    <!-- 依存順に読み込む -->
    <script src="js/settings.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/tilemap.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/item.js"></script>
    <script src="js/wave.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
