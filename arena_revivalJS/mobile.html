<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arena Revival Mobile</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100vw;
            max-height: 55dvh;
            width: auto;
            height: auto;
        }

        #hint {
            color: #555;
            font: 11px monospace;
            margin-top: 6px;
            text-align: center;
        }

        /* ── タッチUI ── */
        #touch-ui {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            justify-content: space-between;
            align-items: flex-end;
            padding: 12px 28px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            z-index: 10;
            pointer-events: none;
        }

        /* 十字キー（攻撃ボタンなし・中央は空白） */
        #dpad {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 4px;
            pointer-events: all;
        }

        .dpad-btn {
            width: 64px; height: 64px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 10px;
            color: #fff;
            font-size: 26px;
            line-height: 1;
            touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
        .dpad-btn:active { background: rgba(255,255,255,0.4); }

        #dpad-up    { grid-area: up; }
        #dpad-left  { grid-area: left; }
        #dpad-right { grid-area: right; }
        #dpad-down  { grid-area: down; }

        #right-cluster {
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: all;
        }

        #pause-btn {
            width: 56px; height: 40px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            color: #aaa;
            font-size: 14px;
            touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="screen"></canvas>
    <div id="hint">WASD / 矢印キー: 移動＋向き変え &nbsp;|&nbsp; 向きを合わせて接触 → 攻撃</div>

    <div id="touch-ui">
        <div id="dpad">
            <button class="dpad-btn" id="dpad-up">▲</button>
            <button class="dpad-btn" id="dpad-left">◀</button>
            <button class="dpad-btn" id="dpad-right">▶</button>
            <button class="dpad-btn" id="dpad-down">▼</button>
        </div>
        <div id="right-cluster">
            <button id="pause-btn">❚❚</button>
        </div>
    </div>

    <!-- 共通モジュール -->
    <script src="js/settings.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/tilemap.js"></script>
    <script src="js/item.js"></script>
    <!-- スマホ専用モジュール -->
    <script src="js/player_mobile.js"></script>
    <script src="js/enemy_mobile.js"></script>
    <script src="js/wave_mobile.js"></script>
    <script src="js/main_mobile.js"></script>
</body>
</html>
